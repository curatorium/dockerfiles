name: Build PHP images

on:
  workflow_dispatch:
    inputs:
      phpvs:
        description: Space-separated PHP versions to build
        default: 8.0 8.1 8.2 8.3 8.4 8.5

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    permissions: {contents: read}
    runs-on: ubuntu-24.04
    outputs:
      ts: ${{ steps.ts.outputs.ts }}
      phpvs: ${{ steps.phpvs.outputs.phpvs }}
      nodevs: ${{ steps.phpvs.outputs.nodevs }}
    steps:
      # Shared so a month rollover mid-run can't split build and merge tags.
      - id: ts
        run: echo "ts=$(date +%y.%m)" >>"$GITHUB_OUTPUT"

      # Filtered in lockstep: an include entry outside PHPVS spawns a ROLE-less job.
      - id: phpvs
        env: {IN: "${{ inputs.phpvs }}", NODEVS: '{"8.0":18,"8.1":18,"8.2":20,"8.3":20,"8.4":22,"8.5":25}'}
        run: |
          LIST=$(jq -cR 'split(" ") | map(select(length > 0))' <<<"$IN")
          echo "phpvs=$LIST" >>"$GITHUB_OUTPUT"
          echo "nodevs=$(jq -c --argjson list "$LIST" \
            'to_entries | map(select(.key as $k | $list | index($k)) | {PHPVS: .key, NODEVS: .value})' \
            <<<"$NODEVS")" >>"$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.PHPVS }} ${{ matrix.ROLE }} ${{ matrix.X_ARCH }}
    needs: version
    permissions: {contents: read, id-token: write, attestations: write}
    strategy:
      fail-fast: false
      # Docker Hub 429s the manifest HEAD when the whole matrix pushes at once.
      max-parallel: 8
      matrix:
        PHPVS: ${{ fromJSON(needs.version.outputs.phpvs) }}
        ROLE: [base, ci, qa, fs]
        X_ARCH: [amd64, arm64]
        include: ${{ fromJSON(needs.version.outputs.nodevs) }}
    runs-on: ${{ matrix.X_ARCH == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      PHPVS: ${{ matrix.PHPVS }}
      X_ARCH: ${{ matrix.X_ARCH }}
      ROLE: ${{ matrix.ROLE }}
      REPO: curatorium/php-${{ matrix.PHPVS }}
      TS: ${{ needs.version.outputs.ts }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: {username: "${{ secrets.DOCKERHUB_USERNAME }}", password: "${{ secrets.DOCKERHUB_TOKEN }}"}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          target: ${{ matrix.ROLE == 'base' && 'php-base' || matrix.ROLE }}
          platforms: linux/${{ matrix.X_ARCH }}
          provenance: mode=max
          sbom: true
          build-args: |
            PHPVS=${{ matrix.PHPVS }}
            NODEVS=${{ matrix.NODEVS }}
          cache-from: type=gha,scope=${{ matrix.PHPVS }}-${{ matrix.ROLE }}-${{ matrix.X_ARCH }}
          cache-to: type=gha,scope=${{ matrix.PHPVS }}-${{ matrix.ROLE }}-${{ matrix.X_ARCH }},mode=max
          outputs: type=image,name=curatorium/php-${{ matrix.PHPVS }},push-by-digest=true,name-canonical=true,push=true

      - name: Test
        env: {SHA: "${{ steps.build.outputs.digest }}"}
        run: |
          BT="$RUNNER_TEMP/bash-test"
          curl -1fsSLR https://github.com/curatorium/bash-import/releases/latest/download/bash-test -o "$BT"
          chmod +x "$BT"
          IMAGE="$REPO@$SHA" "$BT" "tests/$ROLE.test"
          if [ "$ROLE" = base ]; then
            IMAGE="$REPO@$SHA" "$BT" tests/service.test
          fi

      - uses: actions/attest-build-provenance@v2
        with: {subject-name: "docker.io/${{ env.REPO }}", subject-digest: "${{ steps.build.outputs.digest }}", push-to-registry: true}

      - name: Push per-arch tag
        env: {SHA: "${{ steps.build.outputs.digest }}"}
        run: |
          docker buildx imagetools create -t "$REPO:$ROLE-$TS-$X_ARCH" "$REPO@$SHA"

  merge:
    name: Merge ${{ matrix.PHPVS }} ${{ matrix.ROLE }}
    needs: [version, build]
    permissions: {contents: read, id-token: write, attestations: write}
    strategy:
      fail-fast: false
      matrix:
        PHPVS: ${{ fromJSON(needs.version.outputs.phpvs) }}
        ROLE: [base, ci, qa, fs]
    runs-on: ubuntu-24.04
    env:
      ROLE: ${{ matrix.ROLE }}
      REPO: curatorium/php-${{ matrix.PHPVS }}
      TS: ${{ needs.version.outputs.ts }}
    steps:
      - uses: docker/login-action@v3
        with: {username: "${{ secrets.DOCKERHUB_USERNAME }}", password: "${{ secrets.DOCKERHUB_TOKEN }}"}

      # imagetools rather than docker manifest: it preserves the per-arch attestations.
      - name: Join per-arch tags
        id: join
        run: |
          docker buildx imagetools create -t "$REPO:$ROLE-$TS" -t "$REPO:$ROLE" \
            "$REPO:$ROLE-$TS-amd64" "$REPO:$ROLE-$TS-arm64"
          DIGEST=$(docker buildx imagetools inspect "$REPO:$ROLE-$TS" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >>"$GITHUB_OUTPUT"

      # The per-arch attestations don't cover the index that consumers pull.
      - uses: actions/attest-build-provenance@v2
        with: {subject-name: "docker.io/${{ env.REPO }}", subject-digest: "${{ steps.join.outputs.digest }}", push-to-registry: true}
